<!DOCTYPE html>
<html>
<head>
<title>Patient Dashboard | Blood Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{display:flex;background:#f1f5f9;}

.sidebar{
width:250px;
background:linear-gradient(180deg,#1e293b,#0f172a);
color:white;
height:100vh;
padding:20px;
position:fixed;
}

.sidebar h2{margin-bottom:30px;font-size:20px;}

.sidebar button{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:8px;
background:transparent;
color:#cbd5e1;
text-align:left;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#334155;
color:white;
}

.logout{
background:#dc2626 !important;
color:white !important;
}

.main{
margin-left:250px;
padding:30px;
width:100%;
}

.section{display:none;}
.active{display:block;}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
flex:1;
text-align:center;
}

.card h3{color:#64748b;margin-bottom:10px;}
.card p{font-size:26px;font-weight:bold;color:#1e293b;}

.form-card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
margin-bottom:30px;
}

select,input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ddd;
}

.primary{
padding:12px 20px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.primary:hover{background:#2563eb;}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

th,td{padding:15px;text-align:left;}
th{background:#f8fafc;color:#64748b;}
tr:nth-child(even){background:#f1f5f9;}

.badge{
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:600;
}

.pending{background:#facc15;color:#854d0e;}
.accepted{background:#22c55e;color:white;}
.rejected{background:#ef4444;color:white;}

.profile-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2><i class="fa-solid fa-hospital"></i> Patient Panel</h2>

<button onclick="showDashboard()">Dashboard</button>
<button onclick="showTrack()">Track Requests</button>
<button onclick="showProfile()">My Profile</button>

<button onclick="logout()" class="logout">Logout</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboardSection" class="section active">
<h1>Patient Dashboard</h1>

<div class="cards">
<div class="card">
<h3>Total Requests</h3>
<p id="totalReq">0</p>
</div>

<div class="card">
<h3>Approved</h3>
<p id="approvedReq">0</p>
</div>

<div class="card">
<h3>Pending</h3>
<p id="pendingReq">0</p>
</div>
</div>

<div class="form-card">
<h3>Request Blood</h3>

<select id="bloodGroup">
<option value="">Select Blood Group</option>
<option>A+</option><option>A-</option>
<option>B+</option><option>B-</option>
<option>O+</option><option>O-</option>
<option>AB+</option><option>AB-</option>
</select>

<button class="primary" onclick="requestBlood()">Send Request</button>
</div>
</div>

<!-- TRACK -->
<div id="trackSection" class="section">
<h1>Track Your Requests</h1>

<table>
<thead>
<tr>
<th>Blood Group</th>
<th>Status</th>
<th>Approved By</th>
</tr>
</thead>

<tbody id="requestTable"></tbody>

</table>
</div>

<!-- PROFILE -->
<div id="profileSection" class="section">
<h1>My Profile</h1>

<div class="form-card">

<div class="profile-grid">

<input type="text" id="name" placeholder="Full Name" disabled>
<input type="email" id="email" placeholder="Email" disabled>

<input type="text" id="contactNumber" placeholder="Contact Number" disabled>
<input type="text" id="location" placeholder="Location" disabled>

<input type="date" id="dob" disabled>
<input type="text" id="bloodGroupProfile" placeholder="Blood Group" disabled>

<input type="text" id="guardianName" placeholder="Guardian Name" disabled>
<input type="text" id="guardianContact" placeholder="Guardian Contact" disabled>

</div>

<button class="primary" onclick="toggleEdit()" id="editBtn">Edit Profile</button>
<button class="primary" onclick="updateProfile()" id="saveBtn" style="display:none;">Save Changes</button>

</div>
</div>

</div>

<script>

const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

if(!token || role !== "patient"){
window.location="login.html";
}

/* ---------------- NAVIGATION ---------------- */

function hideAll(){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
}

function showDashboard(){
hideAll();
document.getElementById("dashboardSection").classList.add("active");
loadRequests();
}

function showTrack(){
hideAll();
document.getElementById("trackSection").classList.add("active");
loadRequests();
}

function showProfile(){
hideAll();
document.getElementById("profileSection").classList.add("active");
loadProfile();
}

/* ---------------- PROFILE ---------------- */

function toggleEdit(){

document.querySelectorAll("#profileSection input:not(#email)")
.forEach(i=>i.disabled=false);

document.getElementById("editBtn").style.display="none";
document.getElementById("saveBtn").style.display="inline-block";

}

async function loadProfile(){

try{

const res = await fetch("http://localhost:5000/api/patient/profile",{
headers:{ "Authorization":"Bearer "+token }
});

const result = await res.json();
const data = result.data;

document.getElementById("name").value=data.name || "";
document.getElementById("email").value=data.email || "";
document.getElementById("contactNumber").value=data.contactNumber || "";
document.getElementById("location").value=data.location || "";
document.getElementById("dob").value=data.dob ? data.dob.split("T")[0] : "";
document.getElementById("bloodGroupProfile").value=data.bloodGroup || "";
document.getElementById("guardianName").value=data.guardianName || "";
document.getElementById("guardianContact").value=data.guardianContact || "";

}catch(err){
alert("Profile load failed");
}

}

/* ---------------- REQUEST BLOOD ---------------- */

async function requestBlood(){

const bloodGroup=document.getElementById("bloodGroup").value;

if(!bloodGroup){
alert("Select Blood Group");
return;
}

const res=await fetch("http://localhost:5000/api/patient/request",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({bloodGroup})
});

if(res.ok){
alert("Request Sent Successfully");
document.getElementById("bloodGroup").value="";
loadRequests();
}else{
alert("Failed to send request");
}

}

/* ---------------- LOAD REQUESTS ---------------- */

async function loadRequests(){

try{

const res=await fetch("http://localhost:5000/api/patient/requests",{
headers:{ "Authorization":"Bearer "+token }
});

const result=await res.json();
const data=result.data || [];

let total=0;
let approved=0;
let pending=0;

let html="";

data.forEach(r=>{

total++;

let status=(r.status || "").toLowerCase();

if(status==="approved" || status==="accepted") approved++;
if(status==="pending") pending++;

let badge="pending";

if(status==="approved" || status==="accepted") badge="accepted";
if(status==="rejected") badge="rejected";

let approvedBy="-";

if(r.status==="Accepted" && r.donor){
approvedBy=r.donor.name;
}

if(r.status==="Approved" && r.approvedBy){
approvedBy=r.approvedBy.name;
}

html+=`
<tr>
<td>${r.bloodGroup}</td>
<td><span class="badge ${badge}">${r.status}</span></td>
<td>${approvedBy}</td>
</tr>
`;

});

document.getElementById("requestTable").innerHTML=html;

document.getElementById("totalReq").innerText=total;
document.getElementById("approvedReq").innerText=approved;
document.getElementById("pendingReq").innerText=pending;

}catch(err){
alert("Failed to load requests");
}

}

function logout(){
localStorage.clear();
window.location="login.html";
}

window.onload=function(){
loadRequests();
};

</script>

</body>
</html>
