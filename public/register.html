<!DOCTYPE html>
<html>
<head>
<title>Register | Blood Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#1e293b,#0f172a);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    background:#1e293b;
    width:420px;
    padding:35px;
    border-radius:15px;
    box-shadow:0 15px 35px rgba(0,0,0,0.5);
    max-height:95vh;
    overflow-y:auto;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:12px;
}

input, select{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:none;
    background:#334155;
    color:white;
}

input:focus, select:focus{
    outline:none;
    background:#475569;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

button:hover{
    background:#2563eb;
}

.link{
    text-align:center;
    margin-top:15px;
}

.link a{
    color:#60a5fa;
    text-decoration:none;
}

.link a:hover{
    text-decoration:underline;
}

.error{
    color:#f87171;
    text-align:center;
    margin-bottom:10px;
}

.success{
    color:#22c55e;
    text-align:center;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">
<h2><i class="fa-solid fa-user-plus"></i> Register</h2>

<div class="error" id="errorMsg"></div>
<div class="success" id="successMsg"></div>

<div class="input-group">
    <input id="name" type="text" placeholder="Full Name" required>
</div>

<div class="input-group">
    <input id="email" type="email" placeholder="Email" required>
</div>

<div class="input-group">
    <input id="password" type="password" placeholder="Password (Min 6 characters)" required>
</div>

<div class="input-group">
    <select id="role" required>
        <option value="">Select Role</option>
        <option value="donor">Donor</option>
        <option value="patient">Patient</option>
        <option value="hospital">Hospital</option>
    </select>
</div>

<div class="input-group">
    <input id="bloodGroup" type="text" placeholder="Blood Group (A+, O- etc)">
</div>

<div class="input-group">
    <input id="dob" type="date" required>
</div>

<div class="input-group">
    <input id="contactNumber" type="text" placeholder="Contact Number">
</div>

<div class="input-group">
    <input id="location" type="text" placeholder="Location (City / Area)">
</div>

<button onclick="register()">Register</button>

<div class="link">
Already have an account? <a href="login.html">Login</a>
</div>

</div>

<script>

async function register(){

    const errorMsg = document.getElementById("errorMsg");
    const successMsg = document.getElementById("successMsg");

    errorMsg.innerText="";
    successMsg.innerText="";

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const role = document.getElementById("role").value;
    const bloodGroup = document.getElementById("bloodGroup").value.trim();
    const dob = document.getElementById("dob").value;
    const contactNumber = document.getElementById("contactNumber").value.trim();
    const location = document.getElementById("location").value.trim();

    /* ✅ Required Check */
    if(!name || !email || !password || !role || !dob){
        errorMsg.innerText="Please fill all required fields";
        return;
    }

    /* ✅ Password Length */
    if(password.length < 6){
        errorMsg.innerText="Password must be at least 6 characters";
        return;
    }

    /* ✅ Age Validation (18+) */
    const birthDate = new Date(dob);
    const today = new Date();

    let age = today.getFullYear() - birthDate.getFullYear();
    const m = today.getMonth() - birthDate.getMonth();

    if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
        age--;
    }

    if(age < 18){
        errorMsg.innerText="Only 18+ users can register";
        return;
    }

    /* ✅ Contact Number Validation (optional but good) */
    if(contactNumber && !/^[0-9]{10}$/.test(contactNumber)){
        errorMsg.innerText="Enter valid 10-digit contact number";
        return;
    }

    try{
        const res = await fetch("http://localhost:5000/api/auth/register",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                name,
                email,
                password,
                role,
                bloodGroup,
                dob,
                contactNumber,
                location
            })
        });

        const data = await res.json();

        if(!res.ok){
            errorMsg.innerText=data.message || "Registration failed";
            return;
        }

        successMsg.innerText="Registration Successful ✅ Redirecting...";
        setTimeout(()=>{
            window.location.href="login.html";
        },1500);

    }catch(err){
        console.error("REGISTER ERROR:", err);
        errorMsg.innerText="Server not reachable";
    }
}
</script>

</body>
</html>
