<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
display:flex;
background:#f1f5f9;
}

.sidebar{
width:250px;
background:#111827;
color:white;
height:100vh;
padding:20px;
}

.sidebar h2{margin-bottom:30px;}

.sidebar button{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
cursor:pointer;
}

.sidebar button:hover{background:#2563eb;}

.main{
flex:1;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.stats{
display:flex;
gap:20px;
margin-bottom:20px;
}

.stat-box{
flex:1;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
text-align:center;
}

input{
padding:10px;
width:250px;
border-radius:6px;
border:1px solid #ccc;
}

button.primary{
padding:10px 15px;
background:#2563eb;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

button.danger{
background:#dc2626;
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Admin Panel</h2>

<button onclick="showAnalytics()">Analytics</button>
<button onclick="showUsers()">All Users</button>
<button onclick="logout()">Logout</button>

</div>

<div class="main">

<h1>Admin Dashboard</h1>

<!-- ANALYTICS -->
<div id="analyticsSection">

<div class="stats">

<div class="stat-box">
<h3>Total Users</h3>
<h2 id="totalUsers">0</h2>
</div>

<div class="stat-box">
<h3>Total Donors</h3>
<h2 id="totalDonors">0</h2>
</div>

<div class="stat-box">
<h3>Total Patients</h3>
<h2 id="totalPatients">0</h2>
</div>

<div class="stat-box">
<h3>Total Requests</h3>
<h2 id="totalRequests">0</h2>
</div>

</div>

<div class="card">
<canvas id="requestChart"></canvas>
</div>

</div>

<!-- USERS -->
<div id="usersSection" style="display:none;">

<div class="card">
<input type="text" placeholder="Search users..." onkeyup="loadUsers(this.value)">
</div>

<div class="card">
<table>

<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Role</th>
<th>Blood Group</th>
<th>Location</th>
<th>Action</th>
</tr>
</thead>

<tbody id="userTable"></tbody>

</table>
</div>

</div>

</div>

<script>

const API = "http://localhost:5000/api";
const token = localStorage.getItem("token");

if(!token){
alert("Please login");
location="login.html";
}

let chartInstance = null;

/* ================= SECTION SWITCH ================= */

function showAnalytics(){

document.getElementById("analyticsSection").style.display="block";
document.getElementById("usersSection").style.display="none";

loadAnalytics();

}

function showUsers(){

document.getElementById("analyticsSection").style.display="none";
document.getElementById("usersSection").style.display="block";

loadUsers();

}

/* ================= ANALYTICS ================= */

async function loadAnalytics(){

try{

const res = await fetch(`${API}/admin/analytics`,{
headers:{Authorization:"Bearer "+token}
});

const result = await res.json();

if(!result.success){
console.log("Analytics error");
return;
}

const data = result.data;

document.getElementById("totalUsers").innerText = data.totalUsers;
document.getElementById("totalDonors").innerText = data.totalDonors;
document.getElementById("totalPatients").innerText = data.totalPatients;
document.getElementById("totalRequests").innerText = data.totalRequests;

/* Destroy old chart */

if(chartInstance){
chartInstance.destroy();
}

const ctx = document.getElementById("requestChart").getContext("2d");

chartInstance = new Chart(ctx,{
type:'bar',
data:{
labels:['Pending','Approved','Rejected'],
datasets:[{
label:'Requests',
data:[
data.pendingRequests,
data.approvedRequests,
data.rejectedRequests
],
backgroundColor:['#facc15','#22c55e','#ef4444']
}]
}
});

}catch(err){

console.error("Analytics error:",err);

}

}

/* ================= USERS ================= */

async function loadUsers(search=""){

try{

const res = await fetch(`${API}/admin/users?search=${search}`,{
headers:{Authorization:"Bearer "+token}
});

const result = await res.json();

if(!result.success){
console.log("Users load failed");
return;
}

let html="";

result.data.forEach(u=>{

html+=`

<tr>
<td>${u.name}</td>
<td>${u.email}</td>
<td>${u.role}</td>
<td>${u.bloodGroup || "-"}</td>
<td>${u.location || "-"}</td>
<td>
<button class="danger" onclick="deleteUser('${u._id}')">
Delete
</button>
</td>
</tr>

`;

});

document.getElementById("userTable").innerHTML = html;

}catch(err){

console.error("User load error:",err);

}

}

/* ================= DELETE USER ================= */

async function deleteUser(id){

if(!confirm("Delete this user?")) return;

try{

await fetch(`${API}/admin/users/${id}`,{
method:"DELETE",
headers:{Authorization:"Bearer "+token}
});

loadUsers();

}catch(err){

console.error("Delete error:",err);

}

}

/* ================= LOGOUT ================= */

function logout(){

localStorage.clear();
location="login.html";

}

/* INITIAL LOAD */

showAnalytics();

</script>

</body>
</html>
